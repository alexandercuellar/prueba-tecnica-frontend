<div class="p-8 md:p-12">

  <div class="mb-12">
    <h1 class="text-4xl md:text-5xl font-extrabold text-[#002045] mb-2">
      Compañeros de Clase
    </h1>
    <p class="text-lg text-gray-500">
      Periodo académico 2026-1 — Programa de Ingeniería de Sistemas
    </p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
    <div class="lg:col-span-12">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold text-[#002045]">
          Compañeros <span class="text-gray-400">({{ classmates.length }})</span>
        </h2>
        <input type="text" placeholder="Search directory..."
          class="bg-gray-100 px-4 py-2 rounded-lg text-sm focus:outline-none">
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-4">
        <div *ngFor="let student of classmates"
          class="group bg-gray-100 hover:bg-white hover:shadow-lg transition p-6 rounded-xl text-center">
          <div class="relative mb-4">
            <img src="https://i.pravatar.cc/100" class="w-16 h-16 rounded-full mx-auto border-2 border-blue-200">
            <span class="absolute bottom-0 right-8 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></span>
          </div>
          <h3 class="font-bold text-sm text-[#002045]">
            {{ student }}
          </h3>
        </div>
      </div>
      <div class="mt-12 flex flex-col md:flex-row items-center justify-between gap-6 border-t pt-6">
      </div>
    </div>
  </div>
</div>
